services:
  - type: web
    name: telegram-reminder-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TOKEN
        sync: false        # you set this manually in Render dashboard
      - key: WEBHOOK_URL
        sync: false        # you set this manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # you set this manually in Render dashboard
